    <!-- Reviews list -->
    <div class="reviews-list">

      <div class="list-header">
        <span class="list-title">
          {{ activeFilter === 0 ? 'ყველა შეფასება' : activeFilter + ' ★ შეფასება' }}
        </span>
        <span class="list-showing">{{ filteredReviews.length }} / {{ reviews.length }}</span>
      </div>

      <div class="review-card" *ngFor="let r of filteredReviews">
        <div class="review-header">
          <div class="avatar">{{ r.avatar }}</div>
          <div class="review-meta">
            <div class="reviewer-name">
              {{ r.name }}
              <span class="verified-badge" *ngIf="r.verified">
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
                დადასტურებული
              </span>
            </div>
            <div class="review-date">{{ formatDate(r.date) }}</div>
          </div>
          <div class="review-stars">
            <span
              *ngFor="let filled of getStars(r.rating)"
              class="star star--sm"
              [ngClass]="{'star--filled': filled}"
            >★</span>
          </div>
        </div>
        <p class="review-comment">{{ r.comment }}</p>
      </div>

      <div class="empty-state" *ngIf="filteredReviews.length === 0">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <p>ამ რეიტინგით შეფასება არ მოიძებნა</p>
      </div>

    </div>

  </div>
</div>
