<div class="reviews-page">
  <div class="reviews-container">
    <div>
      <p style="font-size: 20px;">შეფასებები <b >{{reviews.length}}</b> </p>
    </div> 
    <!-- Write Review Section -->
    <div class="write-section" *ngIf="currentUser" style="margin-top: 10px;">
      <div class="user-row">
        <img class="user-avatar" [src]="currentUser.Picture" [alt]="currentUser.Name" />
        <div class="user-info">
          <span class="user-name">{{ currentUser.Name }}</span>
        </div>
        <button class="add-btn" (click)="toggleForm()" *ngIf="!showForm">
          დაამატე შეფასება <span style="color: orange;">★</span>
        </button>
      </div>

      <!-- Inline form -->
      <div class="inline-form" *ngIf="showForm">
        <div class="stars-input" (mouseleave)="clearHover()">
          <span
            *ngFor="let n of [1,2,3,4,5]"
            class="star-input"
            [class.active]="n <= (hoveredStar || newRate)"
            (mouseenter)="hoveredStar = n"
            (click)="newRate = n"
          >★</span>
        </div>

        <p style="font-size: 16px; color: grey;">დატოვე კომენტარი</p>
        <textarea
          class="comment-input" style="color: white;"
          [(ngModel)]="newComment"
          rows="3"
        ></textarea>

        <div class="form-actions">
          <button class="cancel-btn" (click)="toggleForm()">გაუქმება</button>
          <button
            class="submit-btn"
            (click)="submitReview()"
            [disabled]="newRate === 0 || isSubmitting"
          >
            <span class="spinner" *ngIf="isSubmitting"></span>
            {{ isSubmitting ? '' : 'გაგზავნა' }}
          </button>
        </div>

        <div class="form-success" *ngIf="submitSuccess">✓ შეფასება დაემატა!</div>
        <div class="form-error" *ngIf="submitError">შეცდომა. სცადეთ თავიდან.</div>
      </div>
    </div>

    <div class="divider" *ngIf="reviews.length > 0 && currentUser"></div>
    <div class="reviews-list" *ngIf="reviews.length > 0">
      <div class="review-card" *ngFor="let r of reviews">
        <div class="review-header">
          <div class="avatar">{{ r.avatar }}</div>
          <div class="review-meta">
            <span class="reviewer-name">{{ r.name }}</span>
            <div class="review-stars">
              <span
                *ngFor="let filled of getStars(r.rating)"
                class="star-display"
                [class.filled]="filled"
              >★</span>
            </div>
          </div>
        </div>
        <p class="review-comment" *ngIf="r.comment">{{ r.comment }}</p>
      </div>
    </div>
    <!-- <p class="no-reviews" *ngIf="reviews.length === 0">შეფასებები არ არის</p> -->
  </div>
</div>
