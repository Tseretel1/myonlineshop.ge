<div class="order-page">
  <div class="order-container" *ngIf="postsLoaded">

    <!-- Left column: form -->
    <div class="order-form">

      <!-- Section: Contact -->
      <div class="form-section">
        <div class="section-label">
          <span class="section-num">01</span>
          <span>საკონტაქტო</span>
        </div>

        <div class="field-block">
          <label class="field-label">
            მობილური ნომერი
            <span class="badge badge--ok" *ngIf="mobileNumber.length>8">✓</span>
            <span class="badge badge--err" *ngIf="mobileNumber.length<9">✗</span>
          </label>
          <div class="editable-row">
            <input
              class="field-input"
              type="text"
              [disabled]="editFieldNum!=1"
              [(ngModel)]="mobileNumber"
              [ngClass]="{'field-input--invalid': mobileInvalid}"
              maxlength="30"
              placeholder="5XX XXX XXX"
            />
            <div class="edit-actions">
              <button class="icon-btn" (click)="editField(1)" *ngIf="editFieldNum!=1" title="რედაქტირება">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
              </button>
              <button class="icon-btn icon-btn--danger" (click)="closeField(1)" *ngIf="editFieldNum==1" title="გაუქმება">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
              </button>
              <button class="icon-btn icon-btn--success" (click)="acceptField(1)" *ngIf="editFieldNum==1" title="დადასტურება">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- Section: Address -->
      <div class="form-section">
        <div class="section-label">
          <span class="section-num">02</span>
          <span>მიწოდების მისამართი</span>
        </div>

        <div class="field-block" *ngIf="!locationOrMap">
          <label class="field-label">
            მისამართი
            <span class="char-count">{{ address.length }}/100</span>
          </label>
          <p class="field-hint">ქალაქი, ქუჩა, კორპუსი, სადარბაზო...</p>
          <textarea
            [(ngModel)]="address"
            [ngClass]="{'field-input--invalid': addressInvalid}"
            class="field-textarea"
            maxlength="100"
          ></textarea>
        </div>

        <div class="map-wrap" *ngIf="locationOrMap">
          <app-map-picker [config]="mapConfig"></app-map-picker>
        </div>
      </div>

      <!-- Section: Comment -->
      <div class="form-section">
        <div class="section-label">
          <span class="section-num">03</span>
          <span>კომენტარი</span>
          <span class="char-count">{{ comment.length }}/300</span>
        </div>
        <textarea
          [(ngModel)]="comment"
          class="field-textarea field-textarea--short"
          maxlength="300"
          placeholder="დამატებითი სურვილები..."
        ></textarea>
      </div>

      <!-- Notice -->
      <div class="notice">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="20 6 9 17 4 12"/></svg>
        თანხის გადახდა ხდება შეკვეთის შემდეგ
      </div>

    </div>

    <!-- Right column: product + order -->
    <div class="order-sidebar">

      <!-- Product card -->
      <div class="product-card">
        <div class="product-image-wrap">
          <div class="quantity-badge">×{{ productQuantity }}</div>
          <app-photo-album [products]="posts" [PhotoCongif]="PhotoConfig" class="album-fill"></app-photo-album>
        </div>

        <div class="product-meta">
          <!-- Quantity control -->
          <div class="qty-row">
            <span class="qty-label">რაოდენობა</span>
            <div class="qty-controls">
              <button class="qty-btn" (click)="minusQuantity()">−</button>
              <span class="qty-value">{{ productQuantity }}</span>
              <button class="qty-btn" (click)="plusQuantity()">+</button>
            </div>
          </div>

          <!-- Price -->
          <div class="price-row">
            <span class="price-label">ჯამი</span>
            <div class="price-value">
              <span>{{ productPrice }}</span>
              <span class="currency">₾</span>
            </div>
          </div>
        </div>
      </div>

      <!-- CTA -->
      <button class="order-cta" (click)="insertOrder()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
        შეკვეთა
      </button>

    </div>

  </div>
</div>
